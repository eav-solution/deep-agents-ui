services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_DEPLOYMENT_URL: ${NEXT_PUBLIC_DEPLOYMENT_URL}
        NEXT_PUBLIC_AGENT_ID: ${NEXT_PUBLIC_AGENT_ID}
        NEXT_PUBLIC_LANGSMITH_API_KEY: ${NEXT_PUBLIC_LANGSMITH_API_KEY}
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: ${NEXT_PUBLIC_DEPLOYMENT_URL}
      NEXT_PUBLIC_AGENT_ID: ${NEXT_PUBLIC_AGENT_ID}
      NEXT_PUBLIC_LANGSMITH_API_KEY: ${NEXT_PUBLIC_LANGSMITH_API_KEY}
    ports:
      - "3000:3000"
